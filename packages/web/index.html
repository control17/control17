<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5f875f" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>control17</title>
    <meta name="description" content="control17 — self-hosted agent team control plane." />
    <style>
      /* Themed scrollbars — match brand palette so overflow regions
         (transcript, sidebar, roster) blend into the dark surface
         instead of showing the OS default light track. */
      :root {
        scrollbar-color: #2a2f35 transparent;
        scrollbar-width: thin;
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a2f35;
        border-radius: 6px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3a4048;
        background-clip: padding-box;
        border: 2px solid transparent;
      }
      ::-webkit-scrollbar-corner {
        background: transparent;
      }
    </style>
  </head>
  <body class="m-0 font-mono bg-brand-bg text-brand-text">
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
