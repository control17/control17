<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5f875f" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>control17</title>
    <meta name="description" content="control17 — self-hosted agent squadron control plane." />
    <!--
      Font loading. Both faces (Barlow Condensed display + IBM Plex Mono body)
      are also @imported from src/brand.css so they land even on routes that
      bypass this shell; the preconnect hints here just cut the initial RTT.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <!--
    Body class: font-mono (Plex) is the default body face, bg-brand-bg /
    text-brand-text set the base color surface. Everything else (font
    weights, heading treatments, scrollbars) comes from src/brand.css.
  -->
  <body class="m-0 font-mono bg-brand-bg text-brand-text">
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
