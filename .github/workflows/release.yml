name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm + create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ROOT_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$ROOT_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match root package version $ROOT_VERSION"
            exit 1
          fi
          echo "tag $GITHUB_REF_NAME matches version $ROOT_VERSION"

      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
