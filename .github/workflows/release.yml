name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm + create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Stamp version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Stamping version $TAG_VERSION from tag $GITHUB_REF_NAME"
          node -e "
            const fs = require('fs');
            const glob = require('path');
            const files = [
              'package.json',
              ...fs.readdirSync('packages', {withFileTypes:true}).filter(d=>d.isDirectory()).map(d=>'packages/'+d.name+'/package.json'),
              ...fs.readdirSync('apps', {withFileTypes:true}).filter(d=>d.isDirectory()).map(d=>'apps/'+d.name+'/package.json'),
            ].filter(f => fs.existsSync(f));
            for (const f of files) {
              const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
              pkg.version = '${TAG_VERSION}';
              fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
              console.log('  ' + f + ' → ' + pkg.version);
            }
          "

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
